name: Auto Merge Staging to Production

on:
  workflow_dispatch: # Allows manual trigger

jobs:
  create-merge-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history for merging

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create build-staging branch
        run: |
          git checkout -b build-staging origin/Staging
          git push origin build-staging

  merge-to-production:
    needs: create-merge-branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge build-staging into Production
        run: |
          git checkout Production
          git pull origin Production
          git merge --no-ff origin/build-staging || (echo "Merge conflict detected" && exit 1)
          git push origin Production || (echo "Merge failed, creating PR" && exit 1)

      - name: Delete build-staging branch (if merged successfully)
        run: |
          if git branch --merged | grep -q "build-staging"; then
            git push origin --delete build-staging
          fi

  create-pull-request:
    needs: merge-to-production
    if: failure() # Run only if merge-to-production fails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Pull Request for merge conflict
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Resolve merge conflicts between Staging and Production"
          title: "Merge Conflict: Staging → Production"
          body: |
            **Automatic Merge Failed**  
            The attempt to merge `Staging` into `Production` encountered conflicts.  
            Please resolve them manually and complete the merge.  
          base: origin/Production
          branch: origin/build-staging
          labels: "merge-conflict, needs-review"
