name: Auto Merge Staging to Production

on:
  workflow_dispatch: # Allows manual trigger

jobs:
  create-merge-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history for merging

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create build-staging branch
        run: |
          git checkout -b build-staging origin/Staging
          git push origin build-staging

  create-pull-request:
    needs: create-merge-branch
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    outputs:
      pr_number: ${{ steps.create_pr.outputs.pull-request-number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create PR from build-staging to production
        id: create_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT }}
          base: Production
          branch: origin/build-staging
          title: "Auto PR: Merge build-staging into Production"
          body: "This PR checks for conflicts before merging build-staging into production."
          labels: auto-merge
          draft: false

  check-for-conflicts:
    needs: create-pull-request
    runs-on: ubuntu-latest
    outputs:
      has_conflict: ${{ steps.check_conflict.outputs.has_conflict }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch PR details
        id: check_conflict
        run: |
          PR_NUMBER=${{ needs.create-pull-request.outputs.pr_number }}
          if [[ -z "$PR_NUMBER" ]]; then
            echo "No PR found, exiting."
            exit 1
          fi
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV
          
          MERGE_STATUS=$(gh pr view $PR_NUMBER --json mergeable --jq .mergeable)
          if [[ "$MERGE_STATUS" == "CONFLICTING" ]]; then
            echo "Merge conflict detected."
            echo "has_conflict=true" >> $GITHUB_OUTPUT
          else
            echo "No conflicts."
            echo "has_conflict=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  auto-merge:
    needs: check-for-conflicts
    if: needs.check-for-conflicts.outputs.has_conflict == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Merge PR
        run: |
          gh pr merge ${{ env.PR_NUMBER }} --squash --delete-branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
