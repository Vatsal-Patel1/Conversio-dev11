name: Auto PR and Merge Staging to Production

on:
  workflow_dispatch: # Manual trigger

jobs:
  create-merge-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history for merging

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create build-staging branch
        run: |
          git checkout -b build-staging origin/Staging
          git push origin build-staging

  create-pull-request:
    needs: create-merge-branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: Production
          branch: build-staging
          title: "Auto PR: Merge build-staging into production"
          body: "This PR merges `build-staging` into `production`. If there are conflicts, please resolve them manually."

  auto-merge-pr:
    needs: create-pull-request
    runs-on: ubuntu-latest
    steps:
      - name: Auto-merge PR if no conflicts
        uses: pascalgn/automerge-action@v0.15.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          pull-request: auto
          merge-method: squash
          approve: true
          delete-branch: true
