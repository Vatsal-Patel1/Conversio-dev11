name: Deploy Development to Staging

on:
  workflow_dispatch: # Manual trigger via GitHub Actions

permissions:
  contents: write  # Allow GitHub Actions to push changes

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Ensure full history is fetched

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch Latest Changes
        run: |
          git fetch origin
          git checkout Staging
          git pull origin Staging
          git merge --no-commit --no-ff origin/Development || true

      - name: Add Allowed Files Manually
        run: |
          # Exclude settings_data.json
          git reset HEAD config/settings_data.json || true
          git checkout -- config/settings_data.json || true
          
          # Allow only NEW JSON files in templates/ (Added files 'A')
          git diff --diff-filter=A --name-only origin/Development -- templates/ | grep '\.json$' | xargs -r git add
          
          # Allow all .liquid file changes in templates/
          git diff --name-only origin/Development -- templates/ | grep '\.liquid$' | xargs -r git add

          # Explicitly prevent modified JSON files in templates/ from being committed
          git diff --diff-filter=M --name-only origin/Development -- templates/ | grep '\.json$' | xargs -r git reset HEAD
          git diff --diff-filter=M --name-only origin/Development -- templates/ | grep '\.json$' | xargs -r git checkout --

          # ✅ Allow ALL changes (new & modified files) in sections/, assets/, layout/, snippets/, and locales/
          for folder in sections assets layout snippets locales; do
            git diff --name-only origin/Development -- $folder/ | xargs -r git add
          done

          # Add settings_schema.json
          git add config/settings_schema.json

          # Commit and push changes (if any)
          git commit -m "Deploy: Selective sync from Development to Staging (including sections, assets, layout, snippets, locales, excluding modified JSONs in templates/)" || echo "No code changes to commit"
          git push origin Staging
