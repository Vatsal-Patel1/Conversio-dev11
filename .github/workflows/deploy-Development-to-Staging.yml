name: Deploy Development to Staging

on:
  workflow_dispatch: # Manual trigger via GitHub Actions

permissions:
  contents: write  # Allow GitHub Actions to push changes

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Staging Branch
        uses: actions/checkout@v3
        with:
          ref: Staging
          fetch-depth: 0  # Ensure the full history is fetched to avoid shallow clone issues

      - name: Fetch All Remote Branches
        run: git fetch --all  # Make sure all branches are fetched from the remote

      - name: Checkout Development Branch
        uses: actions/checkout@v3
        with:
          ref: Development
          fetch-depth: 0  # Ensure the full history is fetched

      - name: List Changed Files Between Staging and Development
        id: list_changed_files
        run: |
          # Get the list of modified, added, or deleted files between Staging and Development
          git diff --name-only origin/Staging...origin/Development > changed_files.txt
          cat changed_files.txt  # Debugging: print out the changed files

      - name: Filter Allowed Files (JSON and Liquid)
        id: filter_json_and_liquid
        run: |
          # Check if the changed_files.txt has content
          if [[ -s changed_files.txt ]]; then
            # Filter out modified JSON files from template folder but include new ones
            NEW_JSON_FILES=$(grep -E '^template/.*\.json$' changed_files.txt | grep '^[^ ]*$')  # Only newly added JSON files
            MODIFIED_LIQUID_FILES=$(grep -E '^template/.*\.liquid$' changed_files.txt)

            # Debugging: Print the filtered files
            echo "New JSON Files: $NEW_JSON_FILES"
            echo "Modified Liquid Files: $MODIFIED_LIQUID_FILES"

            # Combine the allowed files
            ALLOWED_FILES="$NEW_JSON_FILES $MODIFIED_LIQUID_FILES"
            echo "ALLOWED_FILES=$ALLOWED_FILES" >> $GITHUB_ENV  # Save this variable for later use
          else
            echo "No changed files detected. Skipping the merge process."
            exit 1  # Exit if no files were changed
          fi

      - name: Checkout Staging Branch Again
        uses: actions/checkout@v3
        with:
          ref: Staging

      - name: Apply Allowed Changes to Staging
        run: |
          # If ALLOWED_FILES is empty, we stop the workflow
          if [[ -z "$ALLOWED_FILES" ]]; then
            echo "No allowed files to merge. Exiting."
            exit 0
          fi

          # Create a new temporary branch for merging allowed changes
          git checkout -b merge-allowed-changes

          # Add only the allowed files from the Development branch
          for file in $ALLOWED_FILES; do
            git checkout origin/Development -- "$file"
          done

          # Commit and push the allowed changes to a temporary branch
          git add .
          git commit -m "Merge allowed changes from Development to Staging"
          git push origin merge-allowed-changes

      - name: Merge Allowed Changes into Staging
        run: |
          # Checkout the Staging branch and merge the allowed changes
          git checkout Staging
          git merge --no-ff merge-allowed-changes
          git push origin Staging

      - name: Clean Up Temporary Branch
        run: |
          # Delete the temporary merge branch
          git branch -D merge-allowed-changes
          git push origin --delete merge-allowed-changes
