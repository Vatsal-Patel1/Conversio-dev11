name: Deploy Development to Staging

on:
  workflow_dispatch: # Manual trigger via GitHub Actions

permissions:
  contents: write  # Allow GitHub Actions to push changes

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Ensure full history is fetched

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch Latest Changes
        run: |
          git fetch origin
          git checkout Staging
          git pull origin Staging
          git merge --no-commit --no-ff origin/Development || true

      - name: Add Allowed Files Manually
        run: |
          echo "🔹 Excluding settings_data.json"
          git restore --staged config/settings_data.json || true
          git checkout -- config/settings_data.json || true
          
          echo "🔹 Checking for new JSON files in templates/ (Added 'A')..."
          new_json_files=$(git diff --diff-filter=A --name-only origin/Development -- templates/ | grep '\.json$' || true)
          if [[ -n "$new_json_files" ]]; then
            echo "✅ Adding new JSON files:"
            echo "$new_json_files"
            git add $new_json_files
          else
            echo "❌ No new JSON files found."
          fi

          echo "🔹 Checking for modified JSON files in templates/ (Should be ignored)..."
          modified_json_files=$(git diff --diff-filter=M --name-only origin/Development -- templates/ | grep '\.json$' || true)
          if [[ -n "$modified_json_files" ]]; then
            echo "🚫 Excluding modified JSON files:"
            echo "$modified_json_files"
            git restore --staged $modified_json_files
            git checkout -- $modified_json_files
          else
            echo "✅ No modified JSON files found."
          fi

          echo "🔹 Allowing all .liquid file changes in templates/..."
          liquid_files=$(git diff --name-only origin/Development -- templates/ | grep '\.liquid$' || true)
          if [[ -n "$liquid_files" ]]; then
            echo "✅ Adding liquid files:"
            echo "$liquid_files"
            git add $liquid_files
          else
            echo "❌ No .liquid file changes found."
          fi

          echo "🔹 Allowing ALL changes in sections/, assets/, layout/, snippets/, and locales/..."
          allowed_files=$(git diff --name-only origin/Development -- sections/ assets/ layout/ snippets/ locales/ || true)
          if [[ -n "$allowed_files" ]]; then
            echo "✅ Adding allowed files:"
            echo "$allowed_files"
            git add $allowed_files
          else
            echo "❌ No changes found in allowed folders."
          fi

          echo "🔹 Adding settings_schema.json"
          git add config/settings_schema.json

          echo "🔹 Committing and pushing changes..."
          git commit -m "Deploy: Selective sync from Development to Staging" || echo "✅ No code changes to commit"
          git push origin Staging
